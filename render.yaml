services:
  - type: web
    name: sofia-sapienza-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: APPS_SCRIPT_URL
        sync: false
      - key: BOT_SECRET
        sync: false
